<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Avisha</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* Text */
h1 { margin-bottom: 10px; }
#typed { min-height: 60px; color: #444; }

/* Buttons */
button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

#yes { background: #4CAF50; color: white; }
#no { background: #f44336; color: white; }

</style>
</head>

<body>

<div class="card">
    <h1>Sorry, Avisha</h1>
    <p id="typed"></p>

    <p>Can we fix this?</p>

    <button id="yes">Yes</button>
    <button id="no">Not now</button>

    <p id="finalMsg"></p>
</div>

<script>
// Typing effect
const text = "I know I messed up, and I’m sorry. I value our friendship and I don’t want things to stay like this.";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}
type();

// Button actions
document.getElementById("yes").onclick = () => {
    document.getElementById("finalMsg").innerHTML =
        "Thanks for giving me a chance. I’ll do better.";
};

document.getElementById("no").onclick = () => {
    document.getElementById("finalMsg").innerHTML =
        "That’s okay. Take your time. I’m here when you're ready.";
};
</script>

</body>
</html>
