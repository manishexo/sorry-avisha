<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Avisha 💙</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Text */
h1 { margin-bottom: 10px; }
#typed { min-height: 60px; color: #555; }

/* Buttons */
button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

#yes { background: #4CAF50; color: white; }
#no { background: #ff4d4d; color: white; position: absolute; }

/* Hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
    <h1>I'm Sorry Avisha 😔</h1>
    <p id="typed"></p>

    <p>Will you forgive me? 🥺</p>

    <button id="yes">Yes 💙</button>
    <button id="no">No 😢</button>

    <p id="finalMsg"></p>
</div>

<!-- Music -->
<audio id="music" autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
// Typing effect
const text = "I know I hurt you, and I truly regret it... You mean a lot to me. I just want a chance to make things right 💙";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}
type();

// Move NO button
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth * 0.7;
    const y = Math.random() * window.innerHeight * 0.7;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES button click
document.getElementById("yes").onclick = () => {
    document.getElementById("finalMsg").innerHTML =
        "Thank you 😭💙 I promise I'll never hurt you like that again!";
};

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
